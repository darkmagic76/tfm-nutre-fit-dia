    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Reference ADRs when architecture decisions constrain spec
  design:
    - Include sequence diagrams for complex flows
    - Document ADR-level decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing Screaming Architecture patterns
    tdd: true
    test_command: "pnpm test:run"
  verify:
    test_command: "pnpm test:run"
    build_command: "pnpm verify"
    coverage_threshold: 80
  archive:
    - Warn before merging destructive deltas

testing:
  runner: vitest
  command: "pnpm test:run"
  coverage: true
  coverage_command: "pnpm test:coverage"
  layers:
    unit: true
    integration: true
    e2e: false
  quality:
    linter: oxlint (pnpm lint)
    type_checker: tsc -b --noEmit (pnpm typecheck)
